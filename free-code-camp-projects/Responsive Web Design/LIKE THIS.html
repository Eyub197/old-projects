<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="LIKE THIS.css">
</head>
<body>
    <div class="container">
    <form id="survey-form" class="form">
    <fieldset>
   <h1 id ="title">Survey Form</h1> 
   <p id ="description">Welcome to my survey form please be kind and fill it</p>
   <form id="survey form">
    <label for="name" id="name-label">Name<br><input type="text" required id="name" placeholder="name" aria-placeholder="Your name"></label>
    <label for="email" id="email-label">Email<br><input type="email" required id="email" name="email" placeholder="something@gmail.com"></label>
    <label for="number" id="number-label">password<br><input type="password" id="number"  pattern="{12,}" min="0" max="12" placeholder="your password"></label>
</fieldset>
<input type="submit" id="submit">
</div>
</body>
