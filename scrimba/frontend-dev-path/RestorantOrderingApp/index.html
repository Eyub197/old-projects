<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />    <title>Restaurant ordering</title>
</head>
<body>

    <header>
        <ul>
            <li><h1>Jimmies dinner</h1></li>
            <li><p>The best burgers and pizzas in town</p></li>
        </ul>
    </header>
    
    <main class="hero"></main> 


    <section class="modal radius">
        <h4 class="modal-text">Enter your card details</h4>
        <form class="data flex" action="" method="get">
            <input type="text" name="name" id="" value="" class="radius" required>
            <input type="number" name="cardNum" id="" value="cardNum" class="radius" minlength="12" required>
            <input type="number" name="CVV" id="" value="CVV" maxlength="3" class="radius" required>
            <button class="pay radius btn">Pay</button>
        </form>
    </section>

    <h3 class="your-order hidden">Your order</h3> 
    <section class="wrapper"></section>
   
    <!--<section class="buy-order">
        <div class="buy-order-details">
            <h4 class="total-price">Total price</h4>
            <p class="end-price">$5</p>
        </div>
       <div class="buy-btn-container"><button class="buy">Complete order</button></div>
    </section> -->

    <script type="module" src="app.js"></script>
</body>
</html>
