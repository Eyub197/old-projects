<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
                
    <title>Basketball Scoreboard</title>
</head>
<body>
    <div class="container">
        <div class="home">
            <h2 class="home-h">HOME</h2>   
            <div class="black-think">   
            <p class="score-H">0</p>  
            </div>
            <div class="home-btns">
            <button class="plusOne">+1</button>
            <button class="plusTwo">+2</button>
            <button class="plusThree">+3</button>
            </div>
        </div>
        <div class="extras">
            <div class="timer-container">
            <div class="timer"></div>
        </div>
            <button class="btn-n">NEW GAME</button>
            <div class="black-think-period">
                <p></p> 
            </div>
            <p class="period">period</p>
        </div>
       
    
        <div class="guest">
            <h2 class="guest-h">GUEST</h2>  
            <div class="black-think">   
                <p class="score-G">0</p>  
            </div>
            <div class="home-btns">
                <button class="plusOneG">+1</button>
                <button class="plusTwoG">+2</button>
                <button class="plusThreeG">+3</button>
                </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
