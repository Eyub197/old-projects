<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/style.css">
    <title>Find your movie</title>
</head>
<body>

    <header>

        <div>
            <h1 class="title">Find your film</h1>
            <p class="change_page"> <a href="/html/wathclist.html">My watchlist</a></p>
        </div>

        <section class="search_bar">
            <i class="fa-solid fa-magnifying-glass search_bar_icon"></i>
            <input type="text" placeholder="movie" name="" id="">
            <button class="btn">Search</button>
        </section>

    </header>

    <main class="movies"> 
        <section class="placeholder_search">
            <img class="placeholder_img center" src="/images/movie_tape.png" alt="">
            <p class="placeholder_text center">Start Exploring</p>
        </section>
    </main>
    <script type="module" src="/app.js"></script>

</body>
</html>
